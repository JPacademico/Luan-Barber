<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Luan Studio Barber">
  <defs>
    <radialGradient id="bg" cx="50%" cy="34%" r="75%">
      <stop offset="0%" stop-color="#2b2b2b"/>
      <stop offset="55%" stop-color="#141414"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#d7d9dc"/>
      <stop offset="58%" stop-color="#8b8e93"/>
      <stop offset="100%" stop-color="#eceef0"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e9eaec"/>
      <stop offset="50%" stop-color="#6f7276"/>
      <stop offset="100%" stop-color="#c9ccd0"/>
    </linearGradient>
  </defs>

  <circle cx="256" cy="256" r="256" fill="#000000"/>
  <circle cx="256" cy="256" r="250" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="242" fill="none" stroke="url(#ring)" stroke-width="4" opacity="0.85"/>

  <text x="256" y="300" text-anchor="middle" fill="url(#steel)"
        font-family="'Arial Narrow', Arial, Helvetica, sans-serif" font-size="150"
        font-weight="700" letter-spacing="12">LUAN</text>

  <g fill="url(#steel)">
    <rect x="120" y="349" width="40" height="3" rx="1.5"/>
    <rect x="352" y="349" width="40" height="3" rx="1.5"/>
    <text x="256" y="360" text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700"
          letter-spacing="7">STUDIO BARBER</text>
  </g>
</svg>
