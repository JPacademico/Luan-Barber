<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Luan Studio Barber">
  <defs>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#d7d9dc"/>
      <stop offset="58%" stop-color="#8b8e93"/>
      <stop offset="100%" stop-color="#eceef0"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed so the icon survives any mask; content sits inside the safe zone. -->
  <rect width="512" height="512" fill="#0A0A0A"/>

  <g transform="translate(256 256) scale(0.72) translate(-256 -256)">
    <text x="256" y="292" text-anchor="middle" fill="url(#steel)"
          font-family="'Arial Narrow', Arial, Helvetica, sans-serif" font-size="150"
          font-weight="700" letter-spacing="12">LUAN</text>
    <g fill="url(#steel)">
      <rect x="120" y="341" width="40" height="3" rx="1.5"/>
      <rect x="352" y="341" width="40" height="3" rx="1.5"/>
      <text x="256" y="352" text-anchor="middle"
            font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700"
            letter-spacing="7">STUDIO BARBER</text>
    </g>
  </g>
</svg>
