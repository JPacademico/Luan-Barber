<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <!-- id is required: useDocumentMeta swaps this icon per route (public vs. admin branding). -->
    <link id="app-favicon" rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Luan Studio Barber - Experiência, Estilo e Atendimento que Fazem a Diferença. Agende seu horário em Aracaju/SE." />
    <meta name="theme-color" content="#0A0A0A" />
    <title>Luan Studio Barber | Experiência, Estilo e Atendimento</title>

    <!-- PWA: installable app manifest + platform install hints.
         id lets useDocumentMeta swap the manifest per route (public vs. admin install). -->
    <link id="app-manifest" rel="manifest" href="/manifest.webmanifest" />
    <!-- PNG, not SVG: iOS ignores an SVG apple-touch-icon and falls back to a page screenshot. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Luan Studio" />

    <!-- Playfair Display + Inter for the storefront; Plus Jakarta Sans for the admin panel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body class="font-body text-brand-black bg-brand-cream dark:bg-brand-black dark:text-brand-cream transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
